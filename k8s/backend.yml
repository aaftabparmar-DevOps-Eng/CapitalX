apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: capitalx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: aaftabparmar217/capitalx-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: capitalx-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: capitalx-secrets
              key: REDIS_URL
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: capitalx-secrets
              key: JWT_ACCESS_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: capitalx-secrets
              key: JWT_REFRESH_SECRET
        - name: FRONTEND_URL
          value: "http://localhost:30000"
        readinessProbe:
          httpGet:
            path: /api/docs
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: capitalx
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
