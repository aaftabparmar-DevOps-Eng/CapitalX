apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: capitalx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: aaftabparmar217/capitalx-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres:5432/capitalx_db?schema=public"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: JWT_ACCESS_SECRET
          value: "capitalx_access_jwt_secret_change_in_production"
        - name: JWT_REFRESH_SECRET
          value: "capitalx_refresh_jwt_secret_change_in_production"
        - name: JWT_ACCESS_EXPIRES
          value: "15m"
        - name: JWT_REFRESH_EXPIRES
          value: "7d"
        - name: FRONTEND_URL
          value: "http://16.59.47.165:30000"
        - name: ESCROW_PLATFORM_FEE_PERCENT
          value: "2.5"
        readinessProbe:
          httpGet:
            path: /api/v1
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: capitalx
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
