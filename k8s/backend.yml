apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: capitalx

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: aaftabparmar217/capitalx-backend:latest

        ports:
        - containerPort: 3001

        env:

        - name: NODE_ENV
          value: production

        - name: PORT
          value: "3001"

        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres:5432/capitalx_db?schema=public

        - name: REDIS_URL
          value: redis://redis:6379

        - name: JWT_ACCESS_SECRET
          value: capitalx_access_secret

        - name: JWT_REFRESH_SECRET
          value: capitalx_refresh_secret


---
apiVersion: v1
kind: Service

metadata:
  name: backend
  namespace: capitalx

spec:

  selector:
    app: backend

  ports:

  - port: 3001
    targetPort: 3001
