version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: capitalx_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capitalx_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capitalx-net

  redis:
    image: redis:7-alpine
    container_name: capitalx_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capitalx-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capitalx_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/capitalx_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: capitalx_access_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: capitalx_refresh_jwt_secret_change_in_production
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      ESCROW_PLATFORM_FEE_PERCENT: "2.5"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - capitalx-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capitalx_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - capitalx-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  capitalx-net:
    driver: bridge
