apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capitalx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aaftabparmar-DevOps-Eng/CapitalX.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: capitalx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
